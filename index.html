<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>შენი ბიბლიოთეკა</h1>    
    <button class="adding">დაამატე წიგნი</button>
    <div class="book-container">
      <h2>შენი წიგნები</h2>      
    </div>
    <form class="window">
      <button class="close">X</button>
      <h2>წიგნის დამატება</h2>

      <div class="inputs title">
        <label for="title">წიგნის დასახელება:</label>
        <input type="text" name="title" id="title" required/>
      </div>
      <div class="inputs">
        <label for="author">წიგნის ავტორი:</label>
        <input type="text" name="author" id="author" />
      </div>
      <div class="inputs">
        <label for="pages">გვერდების რაოდენობა:</label>
        <input type="text" name="pages" id="pages" />
      </div>
      <div class="inputs read">
        <label class="read" for="read">გაქვს წაკითხული?</label>
        <input type="checkbox" name="read" id="read" />
      </div>
      <button class="addBook">დაამატე</button>
    </form>
    <script src="javascript.js"></script>
  </body>
</html>
